services:

  restaurant-service:
    build: ./restaurant-service
    environment:
      - PORT=3001

  menu-service:
    build: ./menu-service
    environment:
      - PORT=3002

  order-service:
    build: ./order-service
    environment:
      - PORT=3003
      - MENU_SERVICE_URL=http://menu-service:3002
    volumes:
      - ./order-service/serviceAccountKey.json:/app/serviceAccountKey.json:ro
    depends_on:
      - menu-service

  api-gateway:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - restaurant-service
      - menu-service
      - order-service